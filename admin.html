<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/png" href="icon-logo.png">
  <link rel="apple-touch-icon" href="icon-logo.png">
  <title>Admin — Somalia Initiative Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800&display=swap" rel="stylesheet">
  <script>document.documentElement.classList.add('si-admin-auth-pending');</script>
  <link rel="stylesheet" href="admin.css">
  <noscript><style>html.si-admin-auth-pending .passcode-entry{visibility:visible;pointer-events:auto}html.si-admin-auth-pending .passcode-checking{display:none}html.si-admin-auth-pending .passcode-brand{display:flex}</style></noscript>
</head>
<body>
<!-- PASSCODE SCREEN -->
<div id="passcode-screen" class="passcode-screen" role="dialog" aria-modal="true" aria-label="Admin authentication">
  <div class="passcode-wrap">

    <div class="passcode-brand">
      <svg class="passcode-brand__star" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L38.5 24.5H60L42.75 37.5L49.25 58L32 45L14.75 58L21.25 37.5L4 24.5H25.5L32 4Z" fill="white"/>
      </svg>
      <p class="passcode-brand__label">Admin</p>
    </div>

    <div class="passcode-checking" aria-hidden="true">
      <svg class="passcode-brand__star" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M32 4L38.5 24.5H60L42.75 37.5L49.25 58L32 45L14.75 58L21.25 37.5L4 24.5H25.5L32 4Z" fill="white"/>
      </svg>
      <div class="passcode-checking__spinner" aria-hidden="true"></div>
      <p class="passcode-checking__label">Checking…</p>
    </div>

    <div class="passcode-entry">
      <p class="passcode-hint" id="passcode-hint">Enter passcode</p>
      <input
        class="passcode-input"
        id="passcode-input"
        type="password"
        inputmode="numeric"
        autocomplete="one-time-code"
        pattern="[0-9]*"
        maxlength="4"
        enterkeyhint="done"
        placeholder="••••"
        aria-label="4-digit passcode"
      >
    </div>

  </div>
</div>

<div class="shell">

  <!-- MOBILE DRAWER -->
  <div class="drawer-overlay" id="mobile-drawer-overlay" aria-hidden="true"></div>
  <aside class="drawer" id="mobile-drawer" aria-label="Admin navigation drawer" aria-hidden="true">
    <p class="drawer__brand">Somalia Initiative</p>
    <nav class="drawer__nav" aria-label="Admin sections">
      <button type="button" class="drawer__item drawer__item--active" data-panel="months" onclick="selectNavPanel('months');closeMobileDrawer()">Reports</button>
      <button type="button" class="drawer__item" data-panel="overview" onclick="selectNavPanel('overview');closeMobileDrawer()">Overview</button>
      <button type="button" class="drawer__item" data-panel="people" onclick="selectNavPanel('people');closeMobileDrawer()">People</button>
    </nav>
    <div class="drawer__spacer" aria-hidden="true"></div>
    <div class="drawer__bottom" aria-label="Account actions">
      <a href="index.html" class="drawer__item" onclick="closeMobileDrawer()">Public site</a>
      <button type="button" class="drawer__item drawer__item--danger" onclick="closeMobileDrawer();siAdminSignOut()">Sign out</button>
    </div>
  </aside>

  <aside class="sidebar" aria-label="Admin navigation">
    <p class="sidebar__brand">Somalia Initiative</p>
    <nav class="sidebar__nav">
      <button type="button" class="sidebar__item sidebar__item--active" data-panel="months" onclick="selectNavPanel('months')">Reports</button>
      <button type="button" class="sidebar__item" data-panel="overview" onclick="selectNavPanel('overview')">Overview</button>
      <button type="button" class="sidebar__item" data-panel="people" onclick="selectNavPanel('people')">People</button>
    </nav>
    <div class="sidebar__spacer" aria-hidden="true"></div>
    <div class="sidebar__bottom" aria-label="Account actions">
      <a href="index.html" class="sidebar__item" onclick="closeRowMenus()">Public site</a>
      <button type="button" class="sidebar__item sidebar__item--danger" onclick="siAdminSignOut()">Sign out</button>
    </div>
  </aside>

  <div class="shell__body">

  <!-- HEADER -->
  <header class="header">
    <div class="header__nav" id="header-nav">
      <button type="button" class="icon-btn" id="header-nav-btn" aria-label="Open menu" aria-haspopup="true" aria-expanded="false" onclick="toggleHeaderNav(this, event)">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true"><path d="M2.5 4.5h13M2.5 9h13M2.5 13.5h13" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg>
      </button>
    </div>
    <h1 class="header__title" id="header-page-title">Reports</h1>
    <span class="header__save-status" id="save-status" hidden aria-live="polite"></span>
    <div class="header__spacer" aria-hidden="true"></div>
    <div class="header__actions" id="header-month-actions">
      <div id="month-head-menu"></div>
      <button class="btn btn--primary btn--sm btn--pill" id="btn-new-month">
        <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M6 1v10M1 6h10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        New
      </button>
    </div>
  </header>

  <!-- MAIN -->
  <main class="main" id="main">

    <!-- OVERVIEW PANEL -->
    <div class="panel hidden" id="panel-overview">

      <div class="overview-cards">
        <div class="reserves-card">
          <div class="reserves-card__body">
            <p class="reserves-card__label">Current Reserves</p>
            <p class="reserves-card__value" id="reserves-display">—</p>
          </div>
          <button class="btn btn--outline btn--sm" id="btn-edit-reserves">Edit</button>
        </div>
        <div class="reserves-card">
          <div class="reserves-card__body">
            <p class="reserves-card__label">Legacy funds</p>
            <p class="reserves-card__value" id="legacy-funds-display">—</p>
          </div>
          <button class="btn btn--outline btn--sm" id="btn-edit-legacy-funds">Edit</button>
        </div>
      </div>

      <div class="stats-grid" id="overview-stats"></div>

    </div>

    <!-- PEOPLE PANEL -->
    <div class="panel hidden" id="panel-people">

      <p class="panel-intro">People are your master list. Open a report to choose who appears each month and enter amounts.</p>

      <div class="card card--menu-overflow" id="donors-card">
        <div class="section-head">
          <h2 class="section-head__title" id="donors-title">Donors</h2>
        </div>
        <div id="donors-list"></div>
        <div class="add-row">
          <input class="add-row__input field__input people-add-input" id="donor-add-input" type="text" placeholder="Enter name" autocomplete="off" aria-label="New donor name">
          <button type="button" class="btn btn--primary btn--sm" id="btn-add-donor">Add</button>
        </div>
      </div>

      <div class="card card--menu-overflow" id="recipients-card">
        <div class="section-head">
          <h2 class="section-head__title" id="recipients-title">Recipients</h2>
        </div>
        <div id="recipients-list"></div>
        <div class="add-row">
          <input class="add-row__input field__input people-add-input" id="recipient-add-input" type="text" placeholder="Enter name" autocomplete="off" aria-label="New recipient name">
          <button type="button" class="btn btn--primary btn--sm" id="btn-add-recipient">Add</button>
        </div>
      </div>

    </div>

    <!-- MONTHS PANEL -->
    <div class="panel" id="panel-months">

      <div id="months-home"></div>

      <div id="months-detail" hidden>
        <div class="month-controls">
          <button type="button" class="btn btn--ghost btn--sm" id="btn-reports-back">All reports</button>
          <p class="month-controls__title" id="month-detail-title"></p>
        </div>
        <div id="month-detail"></div>
      </div>

    </div>

  </main>

  </div>

</div>

<!-- MODAL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="modal" id="modal">
    <div class="modal__handle"></div>
    <div class="modal__header">
      <h2 class="modal__title" id="modal-title">Title</h2>
      <button class="modal__close" id="modal-close" aria-label="Close">✕</button>
    </div>
    <div class="modal__body" id="modal-body"></div>
    <div class="modal__footer" id="modal-footer"></div>
  </div>
</div>

<script src="data-store.js"></script>
<script>
// ── PASSCODE GATE ─────────────────────────────────────────────────────────────
(function () {
  'use strict';

  const REMEMBER_KEY = 'si_admin_remembered';
  const UNLOCK_MS = 550;

  const screen        = document.getElementById('passcode-screen');
  const hint          = document.getElementById('passcode-hint');
  const inputEl       = document.getElementById('passcode-input');
  const AUTH_LOGOUT_URL = '/api/logout';

  let input  = '';
  let locked = false;

  if (screen) document.body.classList.add('passcode-locked');

  function notifyReady() {
    window.dispatchEvent(new Event('si-admin-ready'));
  }

  function clearPasscodeLock() {
    document.body.classList.remove('passcode-locked');
  }

  function shake() {
    if (!inputEl) return;
    locked = true;
    hint.textContent = 'Incorrect passcode';
    hint.classList.add('is-error');
    inputEl.classList.add('is-error');
    inputEl.classList.remove('is-shaking');
    void inputEl.offsetWidth;
    inputEl.classList.add('is-shaking');
    setTimeout(function () {
      input = '';
      inputEl.value = '';
      hint.textContent = 'Enter passcode';
      hint.classList.remove('is-error');
      inputEl.classList.remove('is-error', 'is-shaking');
      locked = false;
      inputEl.focus();
    }, 900);
  }

  function clearAuthPending() {
    document.documentElement.classList.remove('si-admin-auth-pending');
  }

  function rememberSession() {
    try { localStorage.setItem(REMEMBER_KEY, '1'); } catch { /* ignore */ }
  }

  function clearRemembered() {
    try { localStorage.removeItem(REMEMBER_KEY); } catch { /* ignore */ }
  }

  function unlockFromSession() {
    rememberSession();
    clearAuthPending();
    if (screen) screen.remove();
    clearPasscodeLock();
    notifyReady();
  }

  function unlockFromPasscode() {
    rememberSession();
    clearAuthPending();
    notifyReady();
    screen.classList.add('is-unlocking');
    setTimeout(function () {
      screen.remove();
      clearPasscodeLock();
    }, UNLOCK_MS);
  }

  function showPasscodeForm() {
    clearAuthPending();
    setupPasscodeUI();
  }

  window.siAdminSignOut = function () {
    try { localStorage.removeItem(REMEMBER_KEY); } catch { /* ignore */ }
    fetch(AUTH_LOGOUT_URL, { method: 'POST', credentials: 'include' })
      .catch(function () {})
      .finally(function () {
        window.location.reload();
      });
  };

  function verifyPasscode(code) {
    return fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ passcode: code }),
      credentials: 'include',
    }).then(function (res) { return res.ok; });
  }

  function setupPasscodeUI() {
    if (!inputEl) return;

    function sanitizeAndSync(nextRaw) {
      input = String(nextRaw || '').replace(/\D/g, '').slice(0, 4);
      if (inputEl.value !== input) inputEl.value = input;
      inputEl.classList.remove('is-error');
    }

    function attemptVerifyIfReady() {
      if (locked) return;
      if (input.length !== 4) return;
      locked = true;
      setTimeout(function () {
        verifyPasscode(input)
          .then(function (ok) {
            if (ok) { unlockFromPasscode(); }
            else { locked = false; shake(); }
          })
          .catch(function () {
            locked = false;
            shake();
          });
      }, 110);
    }

    inputEl.addEventListener('input', function () {
      if (!screen.isConnected) return;
      sanitizeAndSync(inputEl.value);
      attemptVerifyIfReady();
    });

    inputEl.addEventListener('keydown', function (e) {
      if (!screen.isConnected) return;
      if (e.key === 'Enter') {
        e.preventDefault();
        sanitizeAndSync(inputEl.value);
        attemptVerifyIfReady();
      }
    });

    sanitizeAndSync(inputEl.value);
    setTimeout(function () { if (inputEl) inputEl.focus(); }, 60);
  }

  function checkSessionAndGate() {
    fetch('/api/auth', { credentials: 'include' })
      .then(function (res) { return res.json(); })
      .then(function (data) {
        if (data && data.ok) {
          unlockFromSession();
        } else {
          clearRemembered();
          showPasscodeForm();
        }
      })
      .catch(function () {
        clearRemembered();
        showPasscodeForm();
      });
  }

  checkSessionAndGate();
})();
</script>

<script src="admin.js"></script>
</body>
</html>
